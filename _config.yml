title: AutoStyllo
description: Concessionária de carros — qualidade e confiança em cada negócio.
url: "https://autostyllobg.com.br"
baseurl: ""

# Informações da concessionária
concessionaria:
  nome: AutoStyllo
  telefone: "(66) 99213-3574"
  whatsapp: "+55 66 99213-3574"
  whatsapp_url: "https://wa.me/message/R6432HU4D6F7I1"
  instagram: "https://www.instagram.com/autostyllobg/"
  facebook: "https://m.facebook.com/p/Auto-Styllo-Ve%C3%ADculos-100086536347400/"
  email:
  endereco: "Av. Ezequiel de Carvalho, QD302 LOTE 02 - JARDIM NOVA BARRA, Barra do Garças - MT, 78606-761"
  horario: "Seg–Sex: 08h–18h | Sáb: 08h–13h"

# Coleções
collections:
  carros:
    output: true
    permalink: /carros/:slug/
  banners:
    output: false

# Defaults
defaults:
  - scope:
      path: ""
      type: "carros"
    values:
      layout: "carro"
  - scope:
      path: ""
      type: "banners"
    values:
      layout: null

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty
timezone: America/Sao_Paulo

# Excluir do build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
